<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>RAZ Report Level 2-3</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #111; color: #fff; font-family: "Segoe UI", sans-serif; overflow: hidden; }

/* Header */
.header { display: flex; align-items: center; gap: 10px; background: #1a1a1a; border-bottom: 1px solid #333; padding: 8px 14px; height: 48px; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
.title { font-size: 0.95rem; font-weight: bold; flex: 1; }
.page-info { font-size: 0.8rem; color: #aaa; }
.tool-btn { background: #333; border: none; color: #fff; border-radius: 7px; padding: 5px 10px; cursor: pointer; font-size: 0.8rem; transition: background .15s; white-space: nowrap; }
.tool-btn:hover { background: #555; }
.tool-btn.active { background: #0078d4; }
.tool-btn.red { background: #7a0000; }
.tool-btn.red:hover { background: #b00; }
.sep { width: 1px; height: 22px; background: #444; }
.color-pick { width: 26px; height: 26px; border-radius: 5px; border: 2px solid #555; cursor: pointer; padding: 0; }
input[type=range] { width: 60px; accent-color: #0078d4; cursor: pointer; }

/* Viewer */
.viewer { position: fixed; top: 48px; left: 0; right: 0; bottom: 48px; display: flex; align-items: center; justify-content: center; overflow: hidden; touch-action: none; }
.page-wrap { position: relative; display: inline-block; transform-origin: center center; }
#spreadWrap { transform-origin: center center; }
.page-img { max-height: calc(100vh - 96px); max-width: 100vw; display: block; pointer-events: none; user-select: none; }
.draw-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: default; touch-action: none; }
.text-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }

/* Footer nav */
.footer { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; border-top: 1px solid #333; padding: 8px 14px; height: 48px; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; gap: 8px; }
.nav-btn { display: none; }
/* Side arrow buttons */
.side-arrow { position: fixed; top: 50%; transform: translateY(-50%); z-index: 150; background: rgba(0,0,0,0.4); border: none; color: #fff; font-size: 3rem; width: 56px; height: 110px; cursor: pointer; border-radius: 10px; display: flex; align-items: center; justify-content: center; transition: background .15s, opacity .15s; opacity: 0.55; }
.side-arrow:hover { background: rgba(0,0,0,0.8); opacity: 1; }
.side-arrow:disabled { opacity: 0.1; cursor: default; pointer-events: none; }
.side-arrow.left { left: 4px; }
.side-arrow.right { right: 4px; }
.page-input-wrap { display: flex; align-items: center; gap: 6px; }
.page-input-wrap input { width: 56px; background: #333; border: 1px solid #555; color: #fff; border-radius: 6px; padding: 4px 8px; font-size: 1rem; text-align: center; outline: none; }
.page-input-wrap input:focus { border-color: #0078d4; }
.page-input-wrap span { color: #aaa; font-size: 0.9rem; white-space: nowrap; }
.zoom-ind { font-size: 0.75rem; color: #888; min-width: 36px; text-align: center; }

/* Text input box */
.text-input-box { position: fixed; border: 2px dashed #0078d4; background: transparent; color: inherit; outline: none; font-size: 20px; font-family: "Segoe UI", sans-serif; padding: 2px 4px; min-width: 80px; min-height: 30px; z-index: 300; resize: none; overflow: hidden; line-height: 1.3; }

/* Zoom indicator popup */
.zoom-pop { position: fixed; bottom: 60px; right: 16px; background: rgba(0,0,0,0.8); color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 200; }
.zoom-pop.show { opacity: 1; }
/* Text boxes */
.tbox { position: absolute; background: transparent; border: 2px dashed rgba(0,120,212,0.5); border-radius: 4px; padding: 4px 6px; font-family: "Segoe UI", sans-serif; font-weight: bold; outline: none; resize: none; overflow: hidden; line-height: 1.3; min-width: 40px; min-height: 28px; cursor: text; box-sizing: border-box; }
.tbox:focus { border: 2px dashed rgba(0,120,212,0.8); background: transparent; }
/* Drag preview rect */
#dragRect { position: absolute; border: 2px dashed #0078d4; background: rgba(0,120,212,0.08); pointer-events: none; display: none; border-radius: 3px; }
/* QR modal */
.qr-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; align-items: center; justify-content: center; }
.qr-modal.show { display: flex; }
.qr-box { background: #fff; border-radius: 16px; padding: 24px; text-align: center; max-width: 280px; width: 90%; }
.qr-box h3 { color: #111; font-size: 1rem; margin-bottom: 4px; }
.qr-box p { color: #666; font-size: 0.75rem; margin-bottom: 16px; word-break: break-all; }
.qr-box img { width: 200px; height: 200px; }
.qr-box { max-width: 340px; }
.qr-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.qr-tab { flex: 1; background: #eee; border: none; border-radius: 6px; padding: 6px; cursor: pointer; font-size: 0.8rem; color: #555; }
.qr-tab.active { background: #0078d4; color: #fff; }
.qr-close { margin-top: 16px; background: #333; color: #fff; border: none; border-radius: 8px; padding: 8px 24px; cursor: pointer; font-size: 0.9rem; }
/* Print */
@media print {
  body * { visibility: hidden; }
  #printArea, #printArea * { visibility: visible; }
  #printArea { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #printArea img { max-width: 100%; max-height: 100%; }
}
</style>
</head>
<body>

<div class="header">
  <span class="title">📚 RAZ Report 2-3</span>
  <button class="tool-btn" data-tool="draw" onclick="setTool('draw')">🖊️ 펜</button>
  <button class="tool-btn" data-tool="text" onclick="setTool('text')">🔤 텍스트</button>
  <button class="tool-btn" data-tool="erase" onclick="setTool('erase')">📝 지우개</button>
  <button class="tool-btn" data-tool="pan" onclick="setTool('pan')">🤚 이동</button>
  <div class="sep"></div>
  <input type="color" id="colorPick" class="color-pick" value="#ff0000">
  <input type="range" id="sizePick" min="2" max="24" value="5">
  <div class="sep"></div>
  <button class="tool-btn" onclick="zoom(0.25)">🔍+</button>
  <span class="zoom-ind" id="zoomLabel">100%</span>
  <button class="tool-btn" onclick="zoom(-0.25)">🔍-</button>
  <button class="tool-btn" onclick="resetZoom()">1:1</button>
  <div class="sep"></div>
  <button class="tool-btn" onclick="toggleFS()">⛶</button>
  <button class="tool-btn" id="spreadBtn" onclick="toggleSpread()">📖 2페이지</button>
  <button class="tool-btn" onclick="showQR()">📱 QR</button>
  <button class="tool-btn" onclick="printPage()">🖨️ 인쇄</button>
  <button class="tool-btn red" onclick="clearCanvas()">🗑️</button>
  <span class="page-info" id="pageInfo">1 / 142</span>
</div>

<!-- QR Modal -->
<div class="qr-modal" id="qrModal" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="qr-box">
    <div class="qr-tabs">
      <button class="qr-tab active" onclick="switchQrTab('page')">📄 현재 페이지 QR</button>
      <button class="qr-tab" onclick="switchQrTab('video')">🎬 영상 재생</button>
    </div>

    <!-- 페이지 QR 탭 -->
    <div id="tabPage">
      <p id="qrUrl" style="font-size:0.7rem;color:#888;margin-bottom:8px;word-break:break-all;"></p>
      <a id="qrLink" href="#" target="_blank">
        <img id="qrImg" src="" alt="QR" style="cursor:pointer;" title="클릭하면 링크로 이동">
      </a>
      <p style="font-size:0.7rem;color:#aaa;margin-top:6px;">스캔 또는 클릭하면 이 페이지로 이동</p>
    </div>

    <!-- 영상 탭 -->
    <div id="tabVideo" style="display:none;">
      <div style="display:flex;gap:6px;margin-bottom:10px;">
        <input id="qrVideoUrl" type="url" placeholder="YouTube 또는 영상 URL" style="flex:1;padding:6px 8px;border-radius:6px;border:1px solid #ccc;font-size:0.82rem;box-sizing:border-box;">
        <button onclick="playVideo()" style="background:#0078d4;color:#fff;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:0.85rem;white-space:nowrap;">▶ 재생</button>
        <button onclick="clearVideo()" style="background:#555;color:#fff;border:none;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:0.85rem;" title="저장된 영상 삭제">✕</button>
      </div>
      <div id="videoContainer" style="width:100%;background:#000;border-radius:8px;overflow:hidden;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;">
        <span style="color:#666;font-size:0.85rem;">URL을 입력하고 재생을 누르세요</span>
      </div>
    </div>

    <button class="qr-close" onclick="closeQrModal()">닫기</button>
  </div>
</div>

<!-- Print area -->
<div id="printArea" style="display:none">
  <img id="printImg" src="">
</div>

<div class="viewer" id="viewer">
  <!-- 1페이지 모드 -->
  <div class="page-wrap" id="pageWrap">
    <img class="page-img" id="pageImg" src="pages/000.jpg" draggable="false">
    <canvas class="draw-canvas" id="drawCanvas"></canvas>
    <div id="dragRect"></div>
    <div class="text-layer" id="textLayer"></div>
  </div>
  <!-- 2페이지 모드 (기본 숨김) -->
  <div id="spreadWrap" style="display:none; flex-direction:row; align-items:center; gap:4px; transform-origin:center center;">
    <div class="page-wrap" id="pageWrapL" style="position:relative; display:inline-block;">
      <img class="page-img" id="pageImgL" src="" draggable="false">
      <canvas class="draw-canvas" id="drawCanvasL"></canvas>
      <div class="text-layer" id="textLayerL"></div>
    </div>
    <div class="page-wrap" id="pageWrapR" style="position:relative; display:inline-block;">
      <img class="page-img" id="pageImgR" src="" draggable="false">
      <canvas class="draw-canvas" id="drawCanvasR"></canvas>
      <div class="text-layer" id="textLayerR"></div>
    </div>
  </div>
</div>

<div class="footer">
  <div style="flex:1"></div>
  <div class="page-input-wrap">
    <input type="number" id="pageInput" min="1" max="140" value="1">
    <span id="pageTotalLabel">/ 140</span>
  </div>
  <div style="flex:1"></div>
</div>

<button class="side-arrow left" id="prevBtn" disabled>&#8249;</button>
<button class="side-arrow right" id="nextBtn">&#8250;</button>

<div class="zoom-pop" id="zoomPop"></div>

<script>
var TOTAL = 140; // pages 001.jpg ~ 140.jpg (skip 000, 141)
var cur = 0;
var tool = 'none';
var spreadMode = false;
var penColor = '#ff0000';
var penSize = 5;
var scale = 1;
var tx = 0, ty = 0;
var isDrawing = false;
var lastX = 0, lastY = 0;
var saves = {};       // page -> canvas imageData
var textSaves = {};   // page -> array of {x, y, text, color, size}

var img = document.getElementById('pageImg');
var canvas = document.getElementById('drawCanvas');
var ctx = canvas.getContext('2d');
var pageWrap = document.getElementById('pageWrap');
var textLayer = document.getElementById('textLayer');
var viewer = document.getElementById('viewer');
var pageInfo = document.getElementById('pageInfo');
var zoomLabel = document.getElementById('zoomLabel');
var zoomPop = document.getElementById('zoomPop');
var prevBtn = document.getElementById('prevBtn');
var nextBtn = document.getElementById('nextBtn');

// ── Canvas resize ──
function resizeCanvas() {
  canvas.width = img.naturalWidth || img.offsetWidth;
  canvas.height = img.naturalHeight || img.offsetHeight;
  canvas.style.width = img.offsetWidth + 'px';
  canvas.style.height = img.offsetHeight + 'px';
  textLayer.style.width = img.offsetWidth + 'px';
  textLayer.style.height = img.offsetHeight + 'px';
  if (saves[cur]) ctx.putImageData(saves[cur], 0, 0);
  renderTextBoxes();
}
img.onload = resizeCanvas;
window.addEventListener('resize', function() {
  resizeCanvas();
  if (spreadMode) loadSpread();
});

// ── Page navigation ──
function goPage(n) {
  if (n < 0 || n >= TOTAL) return;
  saves[cur] = ctx.getImageData(0, 0, canvas.width, canvas.height);
  saveTextBoxes();
  cur = n;
  location.hash = cur;
  img.src = 'pages/' + String(cur + 1).padStart(3,'0') + '.jpg';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  textLayer.innerHTML = '';
  pageInfo.textContent = (cur+1) + ' / ' + TOTAL;
  document.getElementById('pageInput').value = cur + 1;
  prevBtn.disabled = cur === 0;
  nextBtn.disabled = cur === TOTAL - 1;
  img.onload = function() {
    resizeCanvas();
    if (saves[cur]) ctx.putImageData(saves[cur], 0, 0);
    renderTextBoxes();
  };
  resetZoom();
}
window.addEventListener('hashchange', function() {
  var n = parseInt(location.hash.slice(1));
  if (!isNaN(n) && n !== cur) goPage(n);
});

// ── 2페이지 spread 모드 ──
var spreadWrap = document.getElementById('spreadWrap');
var imgL = document.getElementById('pageImgL');
var imgR = document.getElementById('pageImgR');
var canvasL = document.getElementById('drawCanvasL');
var canvasR = document.getElementById('drawCanvasR');
var ctxL = canvasL.getContext('2d');
var ctxR = canvasR.getContext('2d');
var textLayerL = document.getElementById('textLayerL');
var textLayerR = document.getElementById('textLayerR');

function resizeSpreadCanvas(imgEl, cvs, pg) {
  cvs.width = imgEl.naturalWidth || imgEl.offsetWidth;
  cvs.height = imgEl.naturalHeight || imgEl.offsetHeight;
  cvs.style.width = imgEl.offsetWidth + 'px';
  cvs.style.height = imgEl.offsetHeight + 'px';
  if (saves[pg]) (pg === cur ? ctxL : ctxR).putImageData(saves[pg], 0, 0);
}

function loadSpread() {
  resetZoom();
  // cur을 짝수로 맞추기 (항상 왼쪽이 짝수 페이지)
  var left = cur % 2 === 0 ? cur : cur - 1;
  if (left < 0) left = 0;
  var right = left + 1;

  // 뷰어에 꽉 차게 스케일 계산
  function fitSpread() {
    var vw = viewer.offsetWidth - 8;
    var vh = viewer.offsetHeight - 4;
    var iw = imgL.naturalWidth * 2 + 4;
    var ih = imgL.naturalHeight;
    if (!iw || !ih) return;
    var s = Math.min(vw / iw, vh / ih);
    // 각 이미지 크기를 직접 설정 (scale 대신)
    var imgW = Math.floor(imgL.naturalWidth * s);
    var imgH = Math.floor(imgL.naturalHeight * s);
    imgL.style.width = imgW + 'px';
    imgL.style.height = imgH + 'px';
    imgR.style.width = imgW + 'px';
    imgR.style.height = imgH + 'px';
    canvasL.style.width = imgW + 'px';
    canvasL.style.height = imgH + 'px';
    canvasR.style.width = imgW + 'px';
    canvasR.style.height = imgH + 'px';
    spreadWrap.style.transform = '';
  }

  imgL.src = 'pages/' + String(left + 1).padStart(3,'0') + '.jpg';
  imgL.onload = function() {
    canvasL.width = imgL.naturalWidth;
    canvasL.height = imgL.naturalHeight;
    if (saves[left]) ctxL.putImageData(saves[left], 0, 0);
    fitSpread();
  };

  if (right < TOTAL) {
    imgR.style.display = '';
    document.getElementById('pageWrapR').style.display = '';
    imgR.src = 'pages/' + String(right + 1).padStart(3,'0') + '.jpg';
    imgR.onload = function() {
      canvasR.width = imgR.naturalWidth;
      canvasR.height = imgR.naturalHeight;
      if (saves[right]) ctxR.putImageData(saves[right], 0, 0);
      fitSpread();
    };
  } else {
    imgR.style.display = 'none';
    document.getElementById('pageWrapR').style.display = 'none';
  }

  cur = left;
  location.hash = cur;
  pageInfo.textContent = (left+1) + (right < TOTAL ? '-' + (right+1) : '') + ' / ' + TOTAL;
  document.getElementById('pageInput').value = left + 1;
  prevBtn.disabled = cur === 0;
  nextBtn.disabled = cur >= TOTAL - 2;
  renderSpreadTextBoxes(left, right < TOTAL ? right : left);
  // textLayer pointer events
  var isText = tool === 'text';
  textLayerL.style.pointerEvents = isText ? 'all' : 'none';
  textLayerR.style.pointerEvents = isText ? 'all' : 'none';
}

function toggleSpread() {
  spreadMode = !spreadMode;
  var btn = document.getElementById('spreadBtn');
  if (spreadMode) {
    // 1페이지 → 2페이지
    saves[cur] = ctx.getImageData(0, 0, canvas.width, canvas.height);
    saveTextBoxes();
    pageWrap.style.display = 'none';
    spreadWrap.style.display = 'flex';
    btn.classList.add('active');
    loadSpread();
  } else {
    // 2페이지 → 1페이지: spread 필기 저장
    saves[cur] = ctxL.getImageData(0, 0, canvasL.width, canvasL.height);
    if (cur+1 < TOTAL) saves[cur+1] = ctxR.getImageData(0, 0, canvasR.width, canvasR.height);
    saveTextBoxes();
    spreadWrap.style.display = 'none';
    pageWrap.style.display = '';
    btn.classList.remove('active');
    goPage(cur);
  }
}

// ── Tool ──
function setTool(t) {
  // 같은 도구 다시 클릭하면 해제
  if (t === tool) t = 'none';
  tool = t;
  document.querySelectorAll('.tool-btn[data-tool]').forEach(function(b) {
    b.classList.toggle('active', b.dataset.tool === t);
  });
  if (t === 'pan') canvas.style.cursor = 'grab';
  else if (t === 'erase') canvas.style.cursor = 'cell';
  else if (t === 'text') canvas.style.cursor = 'default';
  else if (t === 'draw') canvas.style.cursor = 'crosshair';
  else canvas.style.cursor = 'default';
  textLayer.style.pointerEvents = t === 'text' ? 'all' : 'none';
  textLayerL.style.pointerEvents = t === 'text' ? 'all' : 'none';
  textLayerR.style.pointerEvents = t === 'text' ? 'all' : 'none';
}
document.getElementById('colorPick').oninput = function(e) { penColor = e.target.value; };
document.getElementById('sizePick').oninput = function(e) { penSize = +e.target.value; };

function clearCanvas() {
  if (spreadMode) {
    ctxL.clearRect(0, 0, canvasL.width, canvasL.height);
    ctxR.clearRect(0, 0, canvasR.width, canvasR.height);
    saves[cur] = null; saves[cur+1] = null;
    textLayerL.innerHTML = ''; textLayerR.innerHTML = '';
    textSaves[cur] = []; textSaves[cur+1] = [];
  } else {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    saves[cur] = null;
    textLayer.innerHTML = '';
    textSaves[cur] = [];
  }
}

function toggleFS() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
  else document.exitFullscreen && document.exitFullscreen();
}

// ── Zoom (transform on pageWrap) ──
var zoomTimer;
function showZoomPop() {
  zoomPop.textContent = Math.round(scale*100)+'%';
  zoomPop.classList.add('show');
  clearTimeout(zoomTimer);
  zoomTimer = setTimeout(function() { zoomPop.classList.remove('show'); }, 1000);
}
function applyTransform() {
  if (spreadMode) {
    spreadWrap.style.transform = 'translate('+tx+'px,'+ty+'px) scale('+scale+')';
  } else {
    pageWrap.style.transform = 'translate('+tx+'px,'+ty+'px) scale('+scale+')';
  }
  zoomLabel.textContent = Math.round(scale*100)+'%';
}
function clampTx() {
  var pw = viewer.offsetWidth, ph = viewer.offsetHeight;
  var activeEl = spreadMode ? spreadWrap : pageWrap;
  var iw = activeEl.offsetWidth * scale, ih = activeEl.offsetHeight * scale;
  if (iw <= pw) tx = 0; else { var mx = (iw-pw)/2; tx = Math.min(mx, Math.max(-mx, tx)); }
  if (ih <= ph) ty = 0; else { var my = (ih-ph)/2; ty = Math.min(my, Math.max(-my, ty)); }
}
function zoom(delta) {
  scale = Math.min(4, Math.max(1, scale+delta));
  if (scale === 1) { tx = 0; ty = 0; }
  clampTx(); applyTransform(); showZoomPop();
}
function resetZoom() {
  scale = 1; tx = 0; ty = 0; applyTransform();
}

// ── Pinch ──
var pinchDist0 = 0, pinchScale0 = 1;
viewer.addEventListener('touchstart', function(e) {
  if (e.touches.length === 2) {
    pinchDist0 = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    pinchScale0 = scale;
  }
}, {passive:true});
viewer.addEventListener('touchmove', function(e) {
  if (e.touches.length === 2) {
    e.preventDefault();
    var d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    scale = Math.min(4, Math.max(1, pinchScale0*d/pinchDist0));
    clampTx(); applyTransform(); showZoomPop();
    // 핀치 중엔 스와이프 무시
    swipeStartX = -9999;
  }
}, {passive:false});

// ── Drawing ──
// 현재 그리는 캔버스/컨텍스트/페이지 추적
var activeCanvas = canvas, activeCtx = ctx, activePage = 0;

function getPos(e) {
  var rect = activeCanvas.getBoundingClientRect();
  var sx = activeCanvas.width / rect.width;
  var sy = activeCanvas.height / rect.height;
  var cx = e.touches ? e.touches[0].clientX : e.clientX;
  var cy = e.touches ? e.touches[0].clientY : e.clientY;
  return [(cx-rect.left)*sx, (cy-rect.top)*sy];
}

var panSX = 0, panSY = 0, panTX0 = 0, panTY0 = 0;

function attachDrawCanvas(cvs, cvsCtx, pageOffset) {
  cvs.addEventListener('mousedown', function(e) { startDrawOn(e, cvs, cvsCtx, pageOffset); });
  cvs.addEventListener('touchstart', function(e) { startDrawOn(e, cvs, cvsCtx, pageOffset); }, {passive:true});
}
attachDrawCanvas(canvas, ctx, 0);
attachDrawCanvas(canvasL, ctxL, 0); // left page = cur
attachDrawCanvas(canvasR, ctxR, 1); // right page = cur+1

window.addEventListener('mousemove', doDraw);
window.addEventListener('touchmove', doDraw, {passive:false});
window.addEventListener('mouseup', endDraw);
window.addEventListener('touchend', endDraw);

function startDrawOn(e, cvs, cvsCtx, pageOffset) {
  if (tool === 'text' || tool === 'none') return;
  if (e.touches && e.touches.length > 1) return;
  activeCanvas = cvs; activeCtx = cvsCtx;
  activePage = spreadMode ? cur + pageOffset : cur;
  var cx = e.touches ? e.touches[0].clientX : e.clientX;
  var cy = e.touches ? e.touches[0].clientY : e.clientY;
  if (tool === 'pan') {
    panSX = cx; panSY = cy; panTX0 = tx; panTY0 = ty;
    cvs.style.cursor = 'grabbing';
  } else {
    isDrawing = true;
    var p = getPos(e); lastX = p[0]; lastY = p[1];
  }
}
function startDraw(e) { startDrawOn(e, canvas, ctx, 0); }
function doDraw(e) {
  if (e.touches && e.touches.length > 1) return;
  var cx = e.touches ? e.touches[0].clientX : e.clientX;
  var cy = e.touches ? e.touches[0].clientY : e.clientY;
  if (tool === 'pan' && panSX) {
    e.preventDefault && e.preventDefault();
    tx = panTX0+(cx-panSX); ty = panTY0+(cy-panSY);
    clampTx(); applyTransform();
  } else if (isDrawing) {
    if (e.cancelable) e.preventDefault();
    var p = getPos(e);
    activeCtx.beginPath(); activeCtx.moveTo(lastX, lastY); activeCtx.lineTo(p[0], p[1]);
    if (tool === 'erase') {
      activeCtx.globalCompositeOperation = 'destination-out';
      activeCtx.lineWidth = penSize * 5;
    } else {
      activeCtx.globalCompositeOperation = 'source-over';
      activeCtx.strokeStyle = penColor;
      activeCtx.lineWidth = penSize;
    }
    activeCtx.lineCap = 'round'; activeCtx.lineJoin = 'round'; activeCtx.stroke();
    lastX = p[0]; lastY = p[1];
  }
}
function endDraw() {
  if (isDrawing && activePage !== undefined) saves[activePage] = activeCtx.getImageData(0,0,activeCanvas.width,activeCanvas.height);
  isDrawing = false; panSX = 0;
  if (tool === 'pan') { canvas.style.cursor = 'grab'; canvasL.style.cursor = 'grab'; canvasR.style.cursor = 'grab'; }
}

// ── Text boxes ──
var dragRect = document.getElementById('dragRect');
var dragStart = null;
var activeTextLayer = textLayer, activeTextPage = 0, activePageWrapEl = pageWrap;

function pageLocalPos(clientX, clientY, wrapEl) {
  var r = (wrapEl || activePageWrapEl).getBoundingClientRect();
  return { x: (clientX - r.left) / scale, y: (clientY - r.top) / scale };
}

function saveTextBoxes() {
  // 1페이지 모드
  if (!spreadMode) {
    var arr = [];
    textLayer.querySelectorAll('.tbox').forEach(function(b) {
      arr.push({ x: b.style.left, y: b.style.top, w: b.style.width, h: b.style.height,
                 text: b.value, color: b.style.color, size: b.style.fontSize });
    });
    textSaves[cur] = arr;
  } else {
    // 2페이지 모드: 좌우 각각 저장
    var left = cur, right = cur + 1;
    var arrL = [];
    textLayerL.querySelectorAll('.tbox').forEach(function(b) {
      arrL.push({ x: b.style.left, y: b.style.top, w: b.style.width, h: b.style.height,
                  text: b.value, color: b.style.color, size: b.style.fontSize });
    });
    textSaves[left] = arrL;
    if (right < TOTAL) {
      var arrR = [];
      textLayerR.querySelectorAll('.tbox').forEach(function(b) {
        arrR.push({ x: b.style.left, y: b.style.top, w: b.style.width, h: b.style.height,
                    text: b.value, color: b.style.color, size: b.style.fontSize });
      });
      textSaves[right] = arrR;
    }
  }
}

function renderTextBoxes() {
  textLayer.innerHTML = '';
  (textSaves[cur] || []).forEach(function(d) { makeTextBoxIn(d, textLayer); });
}

function renderSpreadTextBoxes(left, right) {
  textLayerL.innerHTML = '';
  (textSaves[left] || []).forEach(function(d) { makeTextBoxIn(d, textLayerL); });
  textLayerR.innerHTML = '';
  (textSaves[right] || []).forEach(function(d) { makeTextBoxIn(d, textLayerR); });
}

function makeTextBox(d) { return makeTextBoxIn(d, activeTextLayer); }
function makeTextBoxIn(d, layer) {
  var box = document.createElement('textarea');
  box.className = 'tbox';
  box.style.left = d.x; box.style.top = d.y;
  box.style.width = d.w; box.style.height = d.h;
  box.style.color = d.color || penColor;
  box.style.fontSize = d.size || (Math.max(14, penSize * 3) + 'px');
  if (d.text) box.value = d.text;
  box.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { box.blur(); box.remove(); }
    e.stopPropagation();
  });
  layer.appendChild(box);
  return box;
}

function attachTextLayer(tl, wrapEl, pageOffset) {
  tl.addEventListener('mousedown', function(e) {
    if (tool !== 'text') return;
    if (e.target !== tl) return;
    activeTextLayer = tl;
    activePageWrapEl = wrapEl;
    activeTextPage = spreadMode ? cur + pageOffset : cur;
    var p = pageLocalPos(e.clientX, e.clientY, wrapEl);
    dragStart = p;
    dragRect.style.left = p.x+'px'; dragRect.style.top = p.y+'px';
    dragRect.style.width = '0'; dragRect.style.height = '0';
    dragRect.style.display = 'block';
    e.preventDefault();
  });
}
attachTextLayer(textLayer, pageWrap, 0);
attachTextLayer(textLayerL, document.getElementById('pageWrapL'), 0);
attachTextLayer(textLayerR, document.getElementById('pageWrapR'), 1);
window.addEventListener('mousemove', function(e) {
  if (!dragStart) return;
  var p = pageLocalPos(e.clientX, e.clientY);
  var x = Math.min(p.x, dragStart.x), y = Math.min(p.y, dragStart.y);
  var w = Math.abs(p.x - dragStart.x), h = Math.abs(p.y - dragStart.y);
  dragRect.style.left = x+'px'; dragRect.style.top = y+'px';
  dragRect.style.width = w+'px'; dragRect.style.height = h+'px';
});
window.addEventListener('mouseup', function(e) {
  if (!dragStart) return;
  var p = pageLocalPos(e.clientX, e.clientY);
  var x = Math.min(p.x, dragStart.x), y = Math.min(p.y, dragStart.y);
  var w = Math.abs(p.x - dragStart.x), h = Math.abs(p.y - dragStart.y);
  dragRect.style.display = 'none';
  dragStart = null;
  if (w < 15 || h < 15) return;
  var box = makeTextBox({ x: x+'px', y: y+'px', w: w+'px', h: h+'px',
    color: penColor, size: Math.max(14, penSize*3)+'px', text: '' });
  setTimeout(function() { box.focus(); }, 0);
});

  });
  document.getElementById('tabPage').style.display = tab === 'page' ? 'block' : 'none';
  document.getElementById('tabVideo').style.display = tab === 'video' ? 'block' : 'none';
}

function showQR() {
  var url = location.href;
  var encoded = encodeURIComponent(url);
  document.getElementById('qrUrl').textContent = url;
  document.getElementById('qrImg').src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encoded;
  document.getElementById('qrLink').href = url;

  // 2페이지 모드: 왼쪽 페이지(cur) 기준으로 영상 찾기, 없으면 오른쪽(cur+1)도 확인
  var lookPages = spreadMode ? [cur, cur+1] : [cur];
  var pageVideo = null;
  for (var pi = 0; pi < lookPages.length; pi++) {
    if (PAGE_VIDEOS[lookPages[pi]]) { pageVideo = PAGE_VIDEOS[lookPages[pi]]; break; }
  }
  // 그래도 없으면 이전 페이지에서 찾기
  if (!pageVideo) {
    for (var i = cur - 1; i >= 0; i--) {
      if (PAGE_VIDEOS[i]) { pageVideo = PAGE_VIDEOS[i]; break; }
    }
  }
  if (pageVideo) {
    document.getElementById('qrVideoUrl').value = pageVideo;
    switchQrTab('video');
    playVideo();
  } else {
    switchQrTab('video');
  }
  document.getElementById('qrModal').classList.add('show');
}
function clearVideo() {
  localStorage.removeItem('videoUrl');
  document.getElementById('qrVideoUrl').value = '';
  var vc = document.getElementById('videoContainer');
  vc.innerHTML = '<span style="color:#666;font-size:0.85rem;">영상이 없는 페이지입니다</span>';
}
function closeQrModal() {
  // 영상 정지
  var vc = document.getElementById('videoContainer');
  vc.innerHTML = '<span style="color:#666;font-size:0.85rem;">URL을 입력하고 재생을 누르세요</span>';
  document.getElementById('qrVideoUrl').value = '';
  document.getElementById('qrModal').classList.remove('show');
}
function playVideo() {
  var url = document.getElementById('qrVideoUrl').value.trim();
  if (!url) return;
  localStorage.setItem('videoUrl', url); // 저장
  var vc = document.getElementById('videoContainer');
  var embedSrc = '';

  // YouTube
  var ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
  if (ytMatch) {
    embedSrc = 'https://www.youtube.com/embed/' + ytMatch[1] + '?autoplay=1';
    vc.innerHTML = '<iframe width="100%" height="100%" src="' + embedSrc + '" frameborder="0" allow="autoplay; fullscreen" allowfullscreen style="display:block;"></iframe>';
    return;
  }
  // 일반 영상 파일
  vc.innerHTML = '<video src="' + url + '" controls autoplay style="width:100%;height:100%;display:block;"></video>';
}
function printPage() {
  var printImg = document.getElementById('printImg');
  printImg.src = img.src;
  document.getElementById('printArea').style.display = 'flex';
  printImg.onload = function() { window.print(); document.getElementById('printArea').style.display = 'none'; };
  if (printImg.complete) { window.print(); document.getElementById('printArea').style.display = 'none'; }

// ── Page number input ──
var pageInput = document.getElementById('pageInput');
pageInput.addEventListener('change', function() {
  var n = parseInt(this.value) - 1;
  if (!isNaN(n)) goPage(Math.min(TOTAL-1, Math.max(0, n)));
});
pageInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') this.blur();
  e.stopPropagation();
});

// ── Swipe navigation ──
var swipeStartX = 0, swipeStartY = 0, swipeStartTime = 0;
viewer.addEventListener('touchstart', function(e) {
  if (e.touches.length !== 1) return;
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
  swipeStartTime = Date.now();
}, {passive: true});
viewer.addEventListener('touchend', function(e) {
  if (tool === 'draw' || tool === 'erase' || tool === 'text') return;
  var dx = e.changedTouches[0].clientX - swipeStartX;
  var dy = e.changedTouches[0].clientY - swipeStartY;
  var dt = Date.now() - swipeStartTime;
  // 빠르고 수평 스와이프만 인식
  if (dt < 400 && Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (spreadMode) {
      if (dx < 0 && cur + 2 < TOTAL) { cur += 2; loadSpread(); }
      else if (dx > 0 && cur >= 2) { cur -= 2; loadSpread(); }
    } else {
      if (dx < 0) goPage(cur + 1);
      else goPage(cur - 1);
    }
  }
}, {passive: true});

// ── Arrow button click handlers ──
prevBtn.addEventListener('click', function() {
  if (spreadMode) {
    if (cur >= 2) { cur -= 2; loadSpread(); }
  } else {
    goPage(cur - 1);
  }
});
nextBtn.addEventListener('click', function() {
  if (spreadMode) {
    if (cur + 2 < TOTAL) { cur += 2; loadSpread(); }
  } else {
    goPage(cur + 1);
  }
});

// ── Keyboard page nav (only when not typing) ──
document.addEventListener('keydown', function(e) {
  if (document.activeElement && (document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'INPUT')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    if (spreadMode) { if (cur + 2 < TOTAL) { cur += 2; loadSpread(); } } else goPage(cur+1);
  }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    if (spreadMode) { if (cur >= 2) { cur -= 2; loadSpread(); } } else goPage(cur-1);
  }
});

// ── Init ──
var initPage = parseInt(location.hash.slice(1));
if (!isNaN(initPage) && initPage >= 0 && initPage < TOTAL) cur = initPage;
img.src = 'pages/' + String(cur + 1).padStart(3,'0') + '.jpg';
pageInfo.textContent = (cur+1) + ' / ' + TOTAL;
document.getElementById('pageInput').value = cur + 1;
prevBtn.disabled = cur === 0;
nextBtn.disabled = cur === TOTAL - 1;
setTool('none');
