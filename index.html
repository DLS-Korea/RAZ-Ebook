<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>RAZ Report Level 2-3</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #111; color: #fff; font-family: "Segoe UI", sans-serif; overflow: hidden; }

/* Header */
.header { display: flex; align-items: center; gap: 10px; background: #1a1a1a; border-bottom: 1px solid #333; padding: 8px 14px; height: 48px; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
.title { font-size: 0.95rem; font-weight: bold; flex: 1; }
.page-info { font-size: 0.8rem; color: #aaa; }
.tool-btn { background: #333; border: none; color: #fff; border-radius: 7px; padding: 5px 10px; cursor: pointer; font-size: 0.8rem; transition: background .15s; white-space: nowrap; }
.tool-btn:hover { background: #555; }
.tool-btn.active { background: #0078d4; }
.tool-btn.red { background: #7a0000; }
.tool-btn.red:hover { background: #b00; }
.sep { width: 1px; height: 22px; background: #444; }
.color-pick { width: 26px; height: 26px; border-radius: 5px; border: 2px solid #555; cursor: pointer; padding: 0; }
input[type=range] { width: 60px; accent-color: #0078d4; cursor: pointer; }

/* Viewer */
.viewer { position: fixed; top: 48px; left: 0; right: 0; bottom: 48px; display: flex; align-items: center; justify-content: center; overflow: hidden; touch-action: none; }
.page-wrap { position: relative; display: inline-block; transform-origin: center center; }
.page-img { max-height: calc(100vh - 96px); max-width: 100vw; display: block; pointer-events: none; user-select: none; }
.draw-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: default; touch-action: none; }
.text-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }

/* Footer nav */
.footer { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; border-top: 1px solid #333; padding: 8px 14px; height: 48px; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; gap: 8px; }
.nav-btn { background: #333; border: none; color: #fff; border-radius: 7px; padding: 6px 16px; cursor: pointer; font-size: 0.85rem; transition: background .15s; }
.nav-btn:hover:not(:disabled) { background: #555; }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.page-input-wrap { display: flex; align-items: center; gap: 6px; }
.page-input-wrap input { width: 56px; background: #333; border: 1px solid #555; color: #fff; border-radius: 6px; padding: 4px 8px; font-size: 1rem; text-align: center; outline: none; }
.page-input-wrap input:focus { border-color: #0078d4; }
.page-input-wrap span { color: #aaa; font-size: 0.9rem; white-space: nowrap; }
.zoom-ind { font-size: 0.75rem; color: #888; min-width: 36px; text-align: center; }

/* Text input box */
.text-input-box { position: fixed; border: 2px dashed #0078d4; background: transparent; color: inherit; outline: none; font-size: 20px; font-family: "Segoe UI", sans-serif; padding: 2px 4px; min-width: 80px; min-height: 30px; z-index: 300; resize: none; overflow: hidden; line-height: 1.3; }

/* Zoom indicator popup */
.zoom-pop { position: fixed; bottom: 60px; right: 16px; background: rgba(0,0,0,0.8); color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 200; }
.zoom-pop.show { opacity: 1; }
/* Text boxes */
.tbox { position: absolute; background: transparent; border: 2px dashed rgba(0,120,212,0.5); border-radius: 4px; padding: 4px 6px; font-family: "Segoe UI", sans-serif; font-weight: bold; outline: none; resize: none; overflow: hidden; line-height: 1.3; min-width: 40px; min-height: 28px; cursor: text; box-sizing: border-box; }
.tbox:focus { border: 2px dashed rgba(0,120,212,0.8); background: transparent; }
/* Drag preview rect */
#dragRect { position: absolute; border: 2px dashed #0078d4; background: rgba(0,120,212,0.08); pointer-events: none; display: none; border-radius: 3px; }
/* QR modal */
.qr-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; align-items: center; justify-content: center; }
.qr-modal.show { display: flex; }
.qr-box { background: #fff; border-radius: 16px; padding: 24px; text-align: center; max-width: 280px; width: 90%; }
.qr-box h3 { color: #111; font-size: 1rem; margin-bottom: 4px; }
.qr-box p { color: #666; font-size: 0.75rem; margin-bottom: 16px; word-break: break-all; }
.qr-box img { width: 200px; height: 200px; }
.qr-close { margin-top: 16px; background: #333; color: #fff; border: none; border-radius: 8px; padding: 8px 24px; cursor: pointer; font-size: 0.9rem; }
/* Print */
@media print {
  body * { visibility: hidden; }
  #printArea, #printArea * { visibility: visible; }
  #printArea { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #printArea img { max-width: 100%; max-height: 100%; }
}
</style>
</head>
<body>

<div class="header">
  <span class="title">📚 RAZ Report 2-3</span>
  <button class="tool-btn" data-tool="draw" onclick="setTool('draw')">🖊️ 펜</button>
  <button class="tool-btn" data-tool="text" onclick="setTool('text')">🔤 텍스트</button>
  <button class="tool-btn" data-tool="erase" onclick="setTool('erase')">📝 지우개</button>
  <button class="tool-btn" data-tool="pan" onclick="setTool('pan')">🤚 이동</button>
  <div class="sep"></div>
  <input type="color" id="colorPick" class="color-pick" value="#ff0000">
  <input type="range" id="sizePick" min="2" max="24" value="5">
  <div class="sep"></div>
  <button class="tool-btn" onclick="zoom(0.25)">🔍+</button>
  <span class="zoom-ind" id="zoomLabel">100%</span>
  <button class="tool-btn" onclick="zoom(-0.25)">🔍-</button>
  <button class="tool-btn" onclick="resetZoom()">1:1</button>
  <div class="sep"></div>
  <button class="tool-btn" onclick="toggleFS()">⛶</button>
  <button class="tool-btn" onclick="showQR()">📱 QR</button>
  <button class="tool-btn" onclick="printPage()">🖨️ 인쇄</button>
  <button class="tool-btn red" onclick="clearCanvas()">🗑️</button>
  <span class="page-info" id="pageInfo">1 / 142</span>
</div>

<!-- QR Modal -->
<div class="qr-modal" id="qrModal" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="qr-box">
    <h3>📱 이 페이지 QR</h3>
    <p id="qrUrl"></p>
    <img id="qrImg" src="" alt="QR">
    <br>
    <button class="qr-close" onclick="document.getElementById('qrModal').classList.remove('show')">닫기</button>
  </div>
</div>

<!-- Print area -->
<div id="printArea" style="display:none">
  <img id="printImg" src="">
</div>

<div class="viewer" id="viewer">
  <div class="page-wrap" id="pageWrap">
    <img class="page-img" id="pageImg" src="pages/000.jpg" draggable="false">
    <canvas class="draw-canvas" id="drawCanvas"></canvas>
    <div id="dragRect"></div>
    <div class="text-layer" id="textLayer"></div>
  </div>
</div>

<div class="footer">
  <button class="nav-btn" id="prevBtn" onclick="goPage(cur-1)" disabled>← 이전</button>
  <div class="page-input-wrap">
    <input type="number" id="pageInput" min="1" max="140" value="1">
    <span id="pageTotalLabel">/ 140</span>
  </div>
  <button class="nav-btn" id="nextBtn" onclick="goPage(cur+1)">다음 →</button>
</div>

<div class="zoom-pop" id="zoomPop"></div>

<script>
var TOTAL = 140; // pages 001.jpg ~ 140.jpg (skip 000, 141)
var cur = 0;
var TOTAL = 140;
var tool = 'none';
var penColor = '#ff0000';
var penSize = 5;
var scale = 1;
var tx = 0, ty = 0;
var isDrawing = false;
var lastX = 0, lastY = 0;
var saves = {};       // page -> canvas imageData
var textSaves = {};   // page -> array of {x, y, text, color, size}

var img = document.getElementById('pageImg');
var canvas = document.getElementById('drawCanvas');
var ctx = canvas.getContext('2d');
var pageWrap = document.getElementById('pageWrap');
var textLayer = document.getElementById('textLayer');
var viewer = document.getElementById('viewer');
var pageInfo = document.getElementById('pageInfo');
var zoomLabel = document.getElementById('zoomLabel');
var zoomPop = document.getElementById('zoomPop');
var prevBtn = document.getElementById('prevBtn');
var nextBtn = document.getElementById('nextBtn');

// ── Canvas resize ──
function resizeCanvas() {
  canvas.width = img.naturalWidth || img.offsetWidth;
  canvas.height = img.naturalHeight || img.offsetHeight;
  canvas.style.width = img.offsetWidth + 'px';
  canvas.style.height = img.offsetHeight + 'px';
  textLayer.style.width = img.offsetWidth + 'px';
  textLayer.style.height = img.offsetHeight + 'px';
  if (saves[cur]) ctx.putImageData(saves[cur], 0, 0);
  renderTextBoxes();
}
img.onload = resizeCanvas;
window.addEventListener('resize', resizeCanvas);

// ── Page navigation ──
function goPage(n) {
  if (n < 0 || n >= TOTAL) return;
  saves[cur] = ctx.getImageData(0, 0, canvas.width, canvas.height);
  saveTextBoxes();
  cur = n;
  location.hash = cur;
  img.src = 'pages/' + String(cur + 1).padStart(3,'0') + '.jpg';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  textLayer.innerHTML = '';
  pageInfo.textContent = (cur+1) + ' / ' + TOTAL;
  document.getElementById('pageInput').value = cur + 1;
  prevBtn.disabled = cur === 0;
  nextBtn.disabled = cur === TOTAL - 1;
  img.onload = function() {
    resizeCanvas();
    if (saves[cur]) ctx.putImageData(saves[cur], 0, 0);
    renderTextBoxes();
  };
  resetZoom();
}
window.addEventListener('hashchange', function() {
  var n = parseInt(location.hash.slice(1));
  if (!isNaN(n) && n !== cur) goPage(n);
});

// ── Tool ──
function setTool(t) {
  // 같은 도구 다시 클릭하면 해제
  if (t === tool) t = 'none';
  tool = t;
  document.querySelectorAll('.tool-btn[data-tool]').forEach(function(b) {
    b.classList.toggle('active', b.dataset.tool === t);
  });
  if (t === 'pan') canvas.style.cursor = 'grab';
  else if (t === 'erase') canvas.style.cursor = 'cell';
  else if (t === 'text') canvas.style.cursor = 'default';
  else if (t === 'draw') canvas.style.cursor = 'crosshair';
  else canvas.style.cursor = 'default';
  textLayer.style.pointerEvents = t === 'text' ? 'all' : 'none';
}
document.getElementById('colorPick').oninput = function(e) { penColor = e.target.value; };
document.getElementById('sizePick').oninput = function(e) { penSize = +e.target.value; };

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  saves[cur] = null;
  textLayer.innerHTML = '';
  textSaves[cur] = [];
}

function toggleFS() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
  else document.exitFullscreen && document.exitFullscreen();
}

// ── Zoom (transform on pageWrap) ──
var zoomTimer;
function showZoomPop() {
  zoomPop.textContent = Math.round(scale*100)+'%';
  zoomPop.classList.add('show');
  clearTimeout(zoomTimer);
  zoomTimer = setTimeout(function() { zoomPop.classList.remove('show'); }, 1000);
}
function applyTransform() {
  pageWrap.style.transform = 'translate('+tx+'px,'+ty+'px) scale('+scale+')';
  zoomLabel.textContent = Math.round(scale*100)+'%';
}
function clampTx() {
  var pw = viewer.offsetWidth, ph = viewer.offsetHeight;
  var iw = img.offsetWidth * scale, ih = img.offsetHeight * scale;
  if (iw <= pw) tx = 0; else { var mx = (iw-pw)/2; tx = Math.min(mx, Math.max(-mx, tx)); }
  if (ih <= ph) ty = 0; else { var my = (ih-ph)/2; ty = Math.min(my, Math.max(-my, ty)); }
}
function zoom(delta) {
  scale = Math.min(4, Math.max(1, scale+delta));
  if (scale === 1) { tx = 0; ty = 0; }
  clampTx(); applyTransform(); showZoomPop();
}
function resetZoom() {
  scale = 1; tx = 0; ty = 0; applyTransform();
}

// ── Pinch ──
var pinchDist0 = 0, pinchScale0 = 1;
viewer.addEventListener('touchstart', function(e) {
  if (e.touches.length === 2) {
    pinchDist0 = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    pinchScale0 = scale;
  }
}, {passive:true});
viewer.addEventListener('touchmove', function(e) {
  if (e.touches.length === 2) {
    e.preventDefault();
    var d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    scale = Math.min(4, Math.max(1, pinchScale0*d/pinchDist0));
    clampTx(); applyTransform(); showZoomPop();
  }
}, {passive:false});

// ── Drawing ──
function getPos(e) {
  var rect = canvas.getBoundingClientRect();
  var sx = canvas.width / rect.width;
  var sy = canvas.height / rect.height;
  var cx = e.touches ? e.touches[0].clientX : e.clientX;
  var cy = e.touches ? e.touches[0].clientY : e.clientY;
  return [(cx-rect.left)*sx, (cy-rect.top)*sy];
}

var panSX = 0, panSY = 0, panTX0 = 0, panTY0 = 0;

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('touchstart', startDraw, {passive:true});
window.addEventListener('mousemove', doDraw);
window.addEventListener('touchmove', doDraw, {passive:false});
window.addEventListener('mouseup', endDraw);
window.addEventListener('touchend', endDraw);

function startDraw(e) {
  if (tool === 'text' || tool === 'none') return;
  if (e.touches && e.touches.length > 1) return;
  var cx = e.touches ? e.touches[0].clientX : e.clientX;
  var cy = e.touches ? e.touches[0].clientY : e.clientY;
  if (tool === 'pan') {
    panSX = cx; panSY = cy; panTX0 = tx; panTY0 = ty;
    canvas.style.cursor = 'grabbing';
  } else {
    isDrawing = true;
    var p = getPos(e); lastX = p[0]; lastY = p[1];
  }
}
function doDraw(e) {
  if (e.touches && e.touches.length > 1) return;
  var cx = e.touches ? e.touches[0].clientX : e.clientX;
  var cy = e.touches ? e.touches[0].clientY : e.clientY;
  if (tool === 'pan' && panSX) {
    e.preventDefault && e.preventDefault();
    tx = panTX0+(cx-panSX); ty = panTY0+(cy-panSY);
    clampTx(); applyTransform();
  } else if (isDrawing) {
    if (e.cancelable) e.preventDefault();
    var p = getPos(e);
    ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p[0], p[1]);
    if (tool === 'erase') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.lineWidth = penSize * 5;
    } else {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = penColor;
      ctx.lineWidth = penSize;
    }
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
    lastX = p[0]; lastY = p[1];
  }
}
function endDraw() {
  isDrawing = false; panSX = 0;
  if (tool === 'pan') canvas.style.cursor = 'grab';
}

// ── Text boxes ──
var dragRect = document.getElementById('dragRect');
var dragStart = null;

function pageLocalPos(clientX, clientY) {
  var r = pageWrap.getBoundingClientRect();
  return { x: (clientX - r.left) / scale, y: (clientY - r.top) / scale };
}

function saveTextBoxes() {
  var arr = [];
  textLayer.querySelectorAll('.tbox').forEach(function(b) {
    arr.push({ x: b.style.left, y: b.style.top, w: b.style.width, h: b.style.height,
               text: b.value, color: b.style.color, size: b.style.fontSize });
  });
  textSaves[cur] = arr;
}

function renderTextBoxes() {
  textLayer.innerHTML = '';
  (textSaves[cur] || []).forEach(makeTextBox);
}

function makeTextBox(d) {
  var box = document.createElement('textarea');
  box.className = 'tbox';
  box.style.left = d.x; box.style.top = d.y;
  box.style.width = d.w; box.style.height = d.h;
  box.style.color = d.color || penColor;
  box.style.fontSize = d.size || (Math.max(14, penSize * 3) + 'px');
  if (d.text) box.value = d.text;
  box.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { box.blur(); box.remove(); }
    e.stopPropagation();
  });
  textLayer.appendChild(box);
  return box;
}

// Drag on textLayer to draw a box
textLayer.addEventListener('mousedown', function(e) {
  if (tool !== 'text') return;
  if (e.target !== textLayer) return; // let existing boxes handle own clicks
  var p = pageLocalPos(e.clientX, e.clientY);
  dragStart = p;
  dragRect.style.left = p.x+'px'; dragRect.style.top = p.y+'px';
  dragRect.style.width = '0'; dragRect.style.height = '0';
  dragRect.style.display = 'block';
  e.preventDefault();
});
window.addEventListener('mousemove', function(e) {
  if (!dragStart) return;
  var p = pageLocalPos(e.clientX, e.clientY);
  var x = Math.min(p.x, dragStart.x), y = Math.min(p.y, dragStart.y);
  var w = Math.abs(p.x - dragStart.x), h = Math.abs(p.y - dragStart.y);
  dragRect.style.left = x+'px'; dragRect.style.top = y+'px';
  dragRect.style.width = w+'px'; dragRect.style.height = h+'px';
});
window.addEventListener('mouseup', function(e) {
  if (!dragStart) return;
  var p = pageLocalPos(e.clientX, e.clientY);
  var x = Math.min(p.x, dragStart.x), y = Math.min(p.y, dragStart.y);
  var w = Math.abs(p.x - dragStart.x), h = Math.abs(p.y - dragStart.y);
  dragRect.style.display = 'none';
  dragStart = null;
  if (w < 15 || h < 15) return;
  var box = makeTextBox({ x: x+'px', y: y+'px', w: w+'px', h: h+'px',
    color: penColor, size: Math.max(14, penSize*3)+'px', text: '' });
  setTimeout(function() { box.focus(); }, 0);
});

// ── QR & Print ──
function showQR() {
  var url = location.href;
  var encoded = encodeURIComponent(url);
  var qrSrc = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encoded;
  document.getElementById('qrUrl').textContent = url;
  document.getElementById('qrImg').src = qrSrc;
  document.getElementById('qrModal').classList.add('show');
}
function printPage() {
  var printImg = document.getElementById('printImg');
  printImg.src = img.src;
  document.getElementById('printArea').style.display = 'flex';
  printImg.onload = function() { window.print(); document.getElementById('printArea').style.display = 'none'; };
  if (printImg.complete) { window.print(); document.getElementById('printArea').style.display = 'none'; }
}

// ── Page number input ──
var pageInput = document.getElementById('pageInput');
pageInput.addEventListener('change', function() {
  var n = parseInt(this.value) - 1;
  if (!isNaN(n)) goPage(Math.min(TOTAL-1, Math.max(0, n)));
});
pageInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') this.blur();
  e.stopPropagation();
});

// ── Swipe navigation ──
var swipeStartX = 0, swipeStartY = 0, swipeStartTime = 0;
viewer.addEventListener('touchstart', function(e) {
  if (e.touches.length !== 1) return;
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
  swipeStartTime = Date.now();
}, {passive: true});
viewer.addEventListener('touchend', function(e) {
  if (tool === 'draw' || tool === 'erase' || tool === 'text') return;
  var dx = e.changedTouches[0].clientX - swipeStartX;
  var dy = e.changedTouches[0].clientY - swipeStartY;
  var dt = Date.now() - swipeStartTime;
  // 빠르고 수평 스와이프만 인식
  if (dt < 400 && Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0) goPage(cur + 1);
    else goPage(cur - 1);
  }
}, {passive: true});

// ── Keyboard page nav (only when not typing) ──
document.addEventListener('keydown', function(e) {
  if (document.activeElement && (document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'INPUT')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goPage(cur+1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goPage(cur-1);
});

// ── Init ──
var initPage = parseInt(location.hash.slice(1));
if (!isNaN(initPage) && initPage >= 0 && initPage < TOTAL) cur = initPage;
img.src = 'pages/' + String(cur + 1).padStart(3,'0') + '.jpg';
pageInfo.textContent = (cur+1) + ' / ' + TOTAL;
document.getElementById('pageInput').value = cur + 1;
prevBtn.disabled = cur === 0;
nextBtn.disabled = cur === TOTAL - 1;
setTool('none');
</script>
</body>
</html>
